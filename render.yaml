services:
  - type: web
    name: giveaway-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_PATH
        value: /webhook
      - key: ADMIN_PASSWORD
        sync: false
      - key: BOT_MODE
        value: webhook
      - key: PYTHON_VERSION
        value: "3.11.6"
